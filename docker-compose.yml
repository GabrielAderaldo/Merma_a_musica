services:
  # Backend BEAM (Gleam + Elixir/Phoenix) + Frontend estático
  app:
    build:
      context: .
      dockerfile: apps/game_orchestrator/Dockerfile
    environment:
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:-gN8xJ3kT2vP9sR4wQ7yZ1cF6hA0mD5bE8uL3nX2jW4kS7tY0pI9oG6rV1fM8qH}
      PHX_HOST: ${PHX_HOST:-merma-api.caninhagames.fortal.br}
      PHX_SCHEME: https
      PHX_URL_PORT: "443"
      PHX_SERVER: "true"
      PORT: "4000"
      # Streaming platforms (optional)
      SPOTIFY_CLIENT_ID: ${SPOTIFY_CLIENT_ID:-}
      SPOTIFY_CLIENT_SECRET: ${SPOTIFY_CLIENT_SECRET:-}
      SPOTIFY_REDIRECT_URI: ${SPOTIFY_REDIRECT_URI:-}
      DEEZER_APP_ID: ${DEEZER_APP_ID:-}
      DEEZER_SECRET: ${DEEZER_SECRET:-}
      DEEZER_REDIRECT_URI: ${DEEZER_REDIRECT_URI:-}
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID:-}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET:-}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI:-}
    restart: unless-stopped

  # Caddy reverse proxy (HTTPS automático via Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # Caddy usa o Caddyfile com domínios hardcoded
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
